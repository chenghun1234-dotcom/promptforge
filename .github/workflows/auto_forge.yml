name: PromptForge Auto-Generator

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  forge-prompts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq requests

      - name: Run Auto Forge Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: python scripts/auto_forge.py

      - name: Commit and Push New Prompts
        run: |
          git config --global user.name "PromptForge-Bot"
          git config --global user.email "bot@promptforge.io"
          git add src/content/prompts/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto-forged new prompts via Groq" && git push)
